name: "Build FLint"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:

jobs:
  build-linux:
    name: "Build FLint on Linux"
    runs-on: ubuntu-latest
    steps:
      - uses: cachix/install-nix-action@master
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v6
      - name: Build FLint with Nix
        run: nix build -L --no-link
  build-darwin:
    name: "Build FLint on Darwin"
    runs-on: macos-latest
    steps:
      - uses: cachix/install-nix-action@master
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v6
      - name: Build FLint with Nix
        run: nix build -L --no-link
