[package]
name = "flint"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
chrono = "0.4.44"
clap = { version = "4.6.0", default-features = true, features = ["derive"] }
indicatif = { version = "0.18.4", features = ["rayon"] }
rayon = "1.11.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-indicatif = "0.3.14"
tracing-subscriber = "0.3.23"
tree-sitter = "0.26.8"
tree-sitter-nix = "0.3.0"
unicode-width = "0.2.2"
yansi = "1.0.1"
